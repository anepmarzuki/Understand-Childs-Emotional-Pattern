<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metalife — Energy Prism</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #18181f;
    --border: rgba(255,255,255,0.08);
    --gold: #c9a84c;
    --gold2: #e8c97a;
    --gold-dim: rgba(201,168,76,0.15);
    --text: #e8e4dc;
    --text-dim: #8a8580;
    --besi: #a78bfa;
    --air: #60a5fa;
    --api: #f87171;
    --kayu: #4ade80;
    --tanah: #f5d000;
    --besi-dim: rgba(167,139,250,0.12);
    --air-dim: rgba(96,165,250,0.12);
    --api-dim: rgba(248,113,113,0.12);
    --kayu-dim: rgba(74,222,128,0.12);
    --tanah-dim: rgba(245,208,0,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Pro', Georgia, serif;
    font-size: 18px;
    line-height: 1.7;
    overflow-x: hidden;
  }

  /* Background cosmic texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 10%, rgba(201,168,76,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 80% 80%, rgba(96,165,250,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 60% 30%, rgba(167,139,250,0.03) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* Stars */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 45%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 40% 8%, rgba(255,255,255,0.35) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 70%, rgba(255,255,255,0.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 25%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 55%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 92% 12%, rgba(255,255,255,0.35) 0%, transparent 100%),
      radial-gradient(1px 1px at 5% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 48% 92%, rgba(255,255,255,0.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 78% 88%, rgba(255,255,255,0.35) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  main { position: relative; z-index: 1; }

  /* ── HERO ── */
  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 60px 24px;
    position: relative;
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 6px 18px;
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 40px;
    background: var(--gold-dim);
  }

  .hero-badge::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--gold);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .hero h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(42px, 8vw, 88px);
    font-weight: 700;
    line-height: 1.05;
    letter-spacing: -0.02em;
    color: var(--text);
    margin-bottom: 12px;
  }

  .hero h1 span {
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 50%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero-sub {
    font-size: clamp(16px, 2.5vw, 22px);
    color: var(--text-dim);
    font-style: italic;
    margin-bottom: 48px;
    max-width: 520px;
  }

  .prism-svg {
    margin: 0 auto 48px;
    animation: float 6s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }

  .hero-cta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
    color: #0a0a0f;
    font-family: 'Cinzel', serif;
    font-size: 14px;
    letter-spacing: 0.1em;
    font-weight: 600;
    padding: 16px 40px;
    border-radius: 100px;
    text-decoration: none;
    border: none;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 0 40px rgba(201,168,76,0.3);
  }

  .hero-cta:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 60px rgba(201,168,76,0.5);
  }

  /* ── DIVIDER ── */
  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 40px;
    margin: 40px 0;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--border), transparent);
  }

  .divider-icon {
    width: 32px; height: 32px;
    border: 1px solid var(--border);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--gold);
    font-size: 14px;
  }

  /* ── CALCULATOR SECTION ── */
  .calc-section {
    max-width: 800px;
    margin: 0 auto;
    padding: 60px 24px 100px;
  }

  .section-label {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 12px;
    text-align: center;
  }

  .section-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(24px, 4vw, 40px);
    font-weight: 600;
    text-align: center;
    color: var(--text);
    margin-bottom: 8px;
    line-height: 1.2;
  }

  .section-desc {
    text-align: center;
    color: var(--text-dim);
    font-size: 16px;
    margin-bottom: 48px;
    font-style: italic;
  }

  /* ── FORM CARD ── */
  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px;
    position: relative;
    overflow: hidden;
  }

  .form-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-bottom: 24px;
  }

  @media (max-width: 560px) {
    .form-grid { grid-template-columns: 1fr; }
    .form-card { padding: 24px; }
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .form-group label {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold);
  }

  .form-group input, .form-group select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    color: var(--text);
    font-family: 'Crimson Pro', serif;
    font-size: 18px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
  }

  .form-group input:focus, .form-group select:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.1);
  }

  .form-group input::placeholder { color: var(--text-dim); font-style: italic; }

  .form-group select option { background: #18181f; color: var(--text); }

  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: border-color 0.2s;
    grid-column: 1 / -1;
    user-select: none;
  }

  .checkbox-row:hover { border-color: rgba(201,168,76,0.3); }

  .checkbox-row input[type=checkbox] { display: none; }

  .custom-check {
    width: 20px; height: 20px;
    border: 1.5px solid var(--border);
    border-radius: 5px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .checkbox-row input:checked ~ .custom-check {
    background: var(--gold);
    border-color: var(--gold);
  }

  .custom-check::after {
    content: '✓';
    font-size: 12px;
    color: #0a0a0f;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .checkbox-row input:checked ~ .custom-check::after { opacity: 1; }

  .checkbox-label {
    font-size: 15px;
    color: var(--text-dim);
    line-height: 1.4;
  }

  .checkbox-label strong { color: var(--text); }

  .btn-kira {
    width: 100%;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
    color: #0a0a0f;
    font-family: 'Cinzel', serif;
    font-size: 15px;
    letter-spacing: 0.12em;
    font-weight: 700;
    padding: 18px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 0 30px rgba(201,168,76,0.25);
    margin-top: 8px;
  }

  .btn-kira:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 40px rgba(201,168,76,0.45);
  }

  .btn-kira:active { transform: translateY(0); }

  /* ── PRISM DIAGRAM (mini) ── */
  .prism-display {
    margin-top: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .prism-label {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  /* ── RESULTS ── */
  #results {
    display: none;
    margin-top: 40px;
  }

  #results.visible { display: block; }

  .results-header {
    text-align: center;
    margin-bottom: 32px;
  }

  .results-header h3 {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    color: var(--gold);
    margin-bottom: 6px;
  }

  .results-header p {
    color: var(--text-dim);
    font-size: 15px;
    font-style: italic;
  }

  /* Prism node codes */
  .prisma-visual {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    margin-bottom: 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── ELEMENT CARDS ── */
  .element-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  @media (max-width: 500px) {
    .element-grid { grid-template-columns: 1fr; }
  }

  .element-card {
    border-radius: 14px;
    padding: 20px;
    border: 1px solid;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s;
  }

  .element-card:hover { transform: translateY(-2px); }

  .element-card::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0.06;
  }

  .card-besi { border-color: rgba(167,139,250,0.3); background: var(--besi-dim); }
  .card-air  { border-color: rgba(96,165,250,0.3);  background: var(--air-dim);  }
  .card-api  { border-color: rgba(248,113,113,0.3); background: var(--api-dim);  }
  .card-kayu { border-color: rgba(74,222,128,0.3);  background: var(--kayu-dim); }
  .card-tanah{ border-color: rgba(245,208,0,0.3);  background: var(--tanah-dim);}

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .card-name {
    font-family: 'Cinzel', serif;
    font-size: 15px;
    font-weight: 600;
  }

  .card-besi .card-name { color: var(--besi); }
  .card-air  .card-name { color: var(--air);  }
  .card-api  .card-name { color: var(--api);  }
  .card-kayu .card-name { color: var(--kayu); }
  .card-tanah .card-name{ color: var(--tanah);}

  .card-level {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.15em;
    padding: 4px 10px;
    border-radius: 100px;
    border: 1px solid;
  }

  .level-tinggi  { color: #f87171; border-color: rgba(248,113,113,0.4); background: rgba(248,113,113,0.1); }
  .level-dinamik { color: #f5d000; border-color: rgba(245,208,0,0.4);  background: rgba(245,208,0,0.1);  }
  .level-ok      { color: #4ade80; border-color: rgba(74,222,128,0.4);  background: rgba(74,222,128,0.1);  }
  .level-lemah   { color: #94a3b8; border-color: rgba(148,163,184,0.3); background: rgba(148,163,184,0.08);}

  .card-emosi {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 10px;
    font-style: italic;
  }

  .card-desc {
    font-size: 14px;
    color: var(--text);
    line-height: 1.5;
  }

  .card-highlight {
    margin-top: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    background: rgba(0,0,0,0.3);
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.5;
  }

  .card-highlight strong { color: var(--gold); }

  /* Highlight elemen utama */
  .element-card.is-dominant {
    box-shadow: 0 0 30px -5px currentColor;
  }
  .card-besi.is-dominant { box-shadow: 0 0 30px -5px var(--besi); }
  .card-air.is-dominant  { box-shadow: 0 0 30px -5px var(--air);  }
  .card-api.is-dominant  { box-shadow: 0 0 30px -5px var(--api);  }
  .card-kayu.is-dominant { box-shadow: 0 0 30px -5px var(--kayu); }
  .card-tanah.is-dominant{ box-shadow: 0 0 30px -5px var(--tanah);}

  /* Dominant summary */
  .dominant-summary {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    margin-bottom: 24px;
    text-align: center;
  }

  .dominant-summary .dom-label {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .dominant-summary .dom-name {
    font-family: 'Cinzel', serif;
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .dominant-summary .dom-desc {
    font-size: 15px;
    color: var(--text-dim);
    font-style: italic;
  }

  /* kod grid display */
  .kod-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    width: 100%;
    max-width: 360px;
    margin-bottom: 20px;
  }

  .kod-cell {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 6px;
    text-align: center;
  }

  .kod-cell-label {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }

  .kod-cell-val {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--gold);
    line-height: 1.2;
  }

  /* prisma triangle SVG labels */
  .node-val {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 600;
    fill: var(--text);
  }

  .node-label {
    font-size: 10px;
    fill: var(--text-dim);
    font-family: 'Crimson Pro', serif;
  }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 40px 24px;
    border-top: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 14px;
  }

  footer a { color: var(--gold); text-decoration: none; }

  /* Error */
  .error-msg {
    color: var(--api);
    font-size: 14px;
    text-align: center;
    padding: 12px;
    background: rgba(248,113,113,0.08);
    border: 1px solid rgba(248,113,113,0.2);
    border-radius: 10px;
    margin-top: 12px;
    display: none;
  }

  .error-msg.show { display: block; }

  /* reset btn */
  .btn-reset {
    display: block;
    margin: 20px auto 0;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 0.1em;
    padding: 10px 24px;
    border-radius: 100px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }

  .btn-reset:hover { border-color: var(--gold); color: var(--gold); }

  /* scroll reveal */
  .reveal {
    opacity: 0;
    transform: translateY(24px);
    animation: revealUp 0.6s forwards;
  }

  @keyframes revealUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .delay-1 { animation-delay: 0.1s; }
  .delay-2 { animation-delay: 0.2s; }
  .delay-3 { animation-delay: 0.35s; }
  .delay-4 { animation-delay: 0.5s; }

  /* ── RESULT TABLE ── */
  .result-table-wrap {
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 8px;
  }

  .result-table {
    width: 100%;
    border-collapse: collapse;
  }

  .result-table thead tr {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  .result-table th {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
    padding: 12px 8px;
    text-align: center;
    font-weight: 500;
  }

  .result-table th span {
    display: block;
    font-family: 'Crimson Pro', serif;
    font-size: 11px;
    letter-spacing: 0.04em;
    text-transform: none;
    color: var(--text-dim);
    font-style: italic;
    margin-top: 2px;
  }

  .col-elemen { text-align: left; width: 40%; }
  .col-zone   { width: 30%; }

  .result-table tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  .result-table tbody tr:last-child { border-bottom: none; }
  .result-table tbody tr:hover { background: rgba(255,255,255,0.02); }

  .result-table td {
    padding: 12px 8px;
    vertical-align: middle;
  }

  /* elemen name cell */
  .td-name {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .td-icon {
    font-size: 20px;
    line-height: 1;
  }

  .td-label {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    font-weight: 600;
    line-height: 1.3;
  }

  .td-sublabel {
    font-size: 11px;
    color: var(--text-dim);
    font-style: italic;
    font-family: 'Crimson Pro', serif;
  }

  /* zone cell */
  .td-zone {
    text-align: center;
  }

  .zone-val {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    font-weight: 700;
    line-height: 1.1;
    margin-bottom: 6px;
  }

  .zone-bar {
    height: 4px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px;
    overflow: hidden;
    width: 80%;
    margin: 0 auto 6px;
  }

  .zone-bar-fill {
    height: 100%;
    border-radius: 2px;
  }

  .badge-tinggi {
    display: inline-block;
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.12em;
    padding: 3px 8px;
    border-radius: 100px;
    color: #f87171;
    border: 1px solid rgba(248,113,113,0.4);
    background: rgba(248,113,113,0.08);
  }

  .badge-lemah {
    display: inline-block;
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.12em;
    padding: 3px 8px;
    border-radius: 100px;
    color: #94a3b8;
    border: 1px solid rgba(148,163,184,0.25);
    background: rgba(148,163,184,0.06);
  }

  @media (max-width: 420px) {
    .result-table th, .result-table td { padding: 10px 6px; }
    .badge-tinggi, .badge-lemah { font-size: 8px; padding: 3px 6px; letter-spacing: 0.06em; }
    .td-label { font-size: 11px; }
    .col-elemen { width: 36%; }
    .col-zone { width: 32%; }
    .result-table th span { font-size: 10px; }
  }
</style>
</head>

// ── NAMA WARNA ELEMEN ──

// ── GLOBAL STATE ──
let _innerCount = {}, _outerCount = {}, _currentTab = 'inner', _tanahForceTinggi = false, _tanahForceLemah = false;

function toDigit(n) {
  n = Math.abs(parseInt(n));
  while (n > 9) {
    let s = 0;
    while (n > 0) { s += n % 10; n = Math.floor(n / 10); }
    n = s;
  }
  return n;
}

// Inner: 0=Lemah, 1-2=nombor sahaja, 3+=Tinggi
// TANAH inner: 0=Lemah, 1=nombor sahaja, 2+=Tinggi
function getInnerTahap(n, nama) {
  if (nama === 'TANAH' && _tanahForceTinggi) return 'TINGGI';
  if (nama === 'TANAH' && _tanahForceLemah) return 'TIADA';
  if (n === 0) return 'TIADA';
  const threshold = (nama === 'TANAH') ? 2 : 3;
  if (n >= threshold) return 'TINGGI';
  return null;
}

// Outer: 0=tiada ulangan (papar "-"), nombor sahaja jika ada, Tinggi jika threshold
// TANAH: 2+= Tinggi, lain: 3+= Tinggi
function getOuterTahap(n, nama) {
  if (n === 0) return 'DASH';   // tiada nombor berulang → papar "-"
  const threshold = (nama === 'TANAH') ? 2 : 3;
  if (n >= threshold) return 'TINGGI';
  return null; // papar nombor sahaja
}

// ── MAIN CALC ──
async function kiraPrisma() {
  const errEl = document.getElementById('error-msg');
  errEl.classList.remove('show');

  let hari = parseInt(document.getElementById('inp-hari').value);
  const bulan = parseInt(document.getElementById('inp-bulan').value);
  const tahun = parseInt(document.getElementById('inp-tahun').value);
  const subuh = document.getElementById('cbx-subuh').checked;

  if (!hari || !bulan || !tahun || hari<1 || hari>31 || bulan<1 || bulan>12 || tahun<1900 || tahun>2025) {
    errEl.classList.add('show');
    return;
  }

  if (subuh) hari = hari - 1;
  if (hari < 1) hari = 1;

  const kurun = Math.floor(tahun / 100);
  const tahun2 = tahun % 100;

  const A = toDigit(hari);
  const B = toDigit(bulan);
  const C = toDigit(kurun);
  const D = toDigit(tahun2 === 0 ? 9 : tahun2);

  // Inner zone
  const E = toDigit(A + B);
  const F = toDigit(C + D);
  const G = toDigit(E + F);
  const H = toDigit(B + C);
  const I = toDigit(G + H);

  // Outer zone: i=A+E, ii=B+E, iii=C+F, iv=D+F, v=F+G, vi=E+G
  const oi  = toDigit(A + E);
  const oii = toDigit(B + E);
  const oiii= toDigit(C + F);
  const oiv = toDigit(D + F);
  const ov  = toDigit(F + G);
  const ovi = toDigit(E + G);

  // Update SVG prism — inner + outer nodes
  updatePrism({A,B,C,D,E,F,G,H,I}, {oi,oii,oiii,oiv,ov,ovi});

  // Count inner
  const innerNodes = [A,B,C,D,E,F,G,H,I];
  const outerNodes = [oi,oii,oiii,oiv,ov,ovi];

  function addCount(nodes, obj) {
    nodes.forEach(v => {
      const info = elemenInfo[v];
      if (info) obj[info.name] = (obj[info.name]||0) + 1;
    });
  }

  const innerCount = {BESI:0,AIR:0,API:0,KAYU:0,TANAH:0};
  addCount(innerNodes, innerCount);

  // ── OUTER LOGIC BARU ──
  // 1. Kira berapa kali setiap NOMBOR berulang dalam outer nodes
  const outerNumFreq = {};
  outerNodes.forEach(v => { outerNumFreq[v] = (outerNumFreq[v]||0) + 1; });

  // 2. Cari elemen yang ada sekurang-kurangnya 1 nombor berulang (>=2 kali)
  const elemenWithRepeat = new Set();
  Object.entries(outerNumFreq).forEach(([numStr, freq]) => {
    if (freq >= 2) {
      const info = elemenInfo[parseInt(numStr)];
      if (info) elemenWithRepeat.add(info.name);
    }
  });

  // 3. Untuk elemen yang layak (ada ulangan), kira SEMUA nombor outer yg sama elemen
  const outerCount = {BESI:0,AIR:0,API:0,KAYU:0,TANAH:0};
  outerNodes.forEach(v => {
    const info = elemenInfo[v];
    if (info && elemenWithRepeat.has(info.name)) {
      outerCount[info.name] = (outerCount[info.name]||0) + 1;
    }
  });

  // Elemen yang tiada ulangan kekal 0 → papar "-"

  _innerCount = innerCount;
  _outerCount = outerCount;

  // Semak sama ada nombor 5 ada di kedudukan G, H, E, A, F atau I → TANAH TINGGI
  const tanahTinggiPositions = [G, H, E, A, F, I];
  _tanahForceTinggi = tanahTinggiPositions.includes(5);
  _tanahForceLemah = !tanahTinggiPositions.includes(5);

  await incrementUsage();
  updateUsageDisplay();

  // Lock button kalau dah habis
  // Dominant (by inner)
  let dominant = 'BESI', maxC = -1;
  Object.entries(innerCount).forEach(([k,v]) => { if (v > maxC) { maxC = v; dominant = k; } });

  // Update base codes display
  // Build table
  _currentTab = 'inner';
  buildTable();

  const resultsEl = document.getElementById('results');
  resultsEl.classList.add('visible');
  resultsEl.scrollIntoView({ behavior:'smooth', block:'start' });
}

// ── BUILD TABLE ──
function buildTable() {
  const outputEl = document.getElementById('result-text-output');
  outputEl.innerHTML = '';

  // Semak syarat Dinamik: BESI, AIR, API, KAYU semua innerCount === 2
  const isDinamik = _innerCount['BESI'] === 2 && _innerCount['AIR'] === 2 &&
                    _innerCount['API'] === 2 && _innerCount['KAYU'] === 2;

  const tableWrap = document.querySelector('.result-table-wrap');

  if (isDinamik) {
    tableWrap.style.display = 'none';
    document.getElementById('dinamik-msg').style.display = 'block';

    const nameColor = {BESI:'var(--besi)',AIR:'var(--air)',API:'var(--api)',KAYU:'var(--kayu)',TANAH:'var(--tanah)'};
    const elemenOrder = ['BESI','AIR','API','KAYU','TANAH'];
    const outerTinggiList = elemenOrder.filter(nama => getOuterTahap(_outerCount[nama], nama) === 'TINGGI');

    const outerEl = document.getElementById('dinamik-outer');
    if (outerTinggiList.length > 0) {
      const warnaList = outerTinggiList.map(nama =>
        `<strong style="color:${nameColor[nama]}">${namaWarna[nama]}</strong>`
      ).join(', ');
      outerEl.innerHTML = `However, if external factors are present, this child will show high ${warnaList} elements.`;
      outerEl.style.display = 'block';
    } else {
      outerEl.style.display = 'none';
    }

    return;
  } else {
    tableWrap.style.display = '';
    document.getElementById('dinamik-msg').style.display = 'none';
  }

  const elemenOrder = ['BESI','AIR','API','KAYU','TANAH'];
  const nameColor = {BESI:'var(--besi)',AIR:'var(--air)',API:'var(--api)',KAYU:'var(--kayu)',TANAH:'var(--tanah)'};

  const tinggiList = [];
  const tiadaList  = [];

  elemenOrder.forEach(nama => {
    const ic = _innerCount[nama];
    const oc = _outerCount[nama];
    const iTahap = getInnerTahap(ic, nama);
    const oTahap = getOuterTahap(oc, nama);

    if (iTahap === 'TINGGI' || oTahap === 'TINGGI') {
      tinggiList.push(nama);
    }
    if (iTahap === 'TIADA') {
      tiadaList.push(nama);
    }
  });

  // Build teks tinggi
  let html = '';
  if (tinggiList.length > 0) {
    html += `<p style="color:var(--text);margin-bottom:10px;">This child has a tendency toward color elements <span style="color:var(--text-dim);font-style:italic;">(chapter 3)</span>:</p>`;
    html += '<ol style="padding-left:24px;margin-bottom:24px;">';
    tinggiList.forEach(nama => {
      html += `<li><strong style="color:${nameColor[nama]}">${namaWarna[nama]}</strong></li>`;
    });
    html += '</ol>';
  }

  // Build teks tiada
  if (tiadaList.length > 0) {
    html += `<p style="color:var(--text);margin-bottom:10px;">This child also lacks color elements <span style="color:var(--text-dim);font-style:italic;">(chapter 4)</span>:</p>`;
    html += '<ol style="padding-left:24px;">';
    tiadaList.forEach(nama => {
      html += `<li><strong style="color:${nameColor[nama]}">${namaWarna[nama]}</strong></li>`;
    });
    html += '</ol>';
  }

  if (!html) {
    html = `<p style="color:var(--text-dim);font-style:italic;">No prominent elements.</p>`;
  }

  outputEl.innerHTML = html;
}

// ── UPDATE PRISM SVG ──
function updatePrism(inner, outer) {
  const cMap = {besi:'#a78bfa',air:'#60a5fa',api:'#f87171',kayu:'#4ade80',tanah:'#f5d000'};
  const idMap = {A:'v-A',B:'v-B',C:'v-C',D:'v-D',E:'v-E',F:'v-F',G:'v-G',H:'v-H',I:'v-I'};
  Object.entries(inner).forEach(([k,v]) => {
    const el = document.getElementById(idMap[k]);
    if (!el) return;
    el.textContent = v;
    const info = elemenInfo[v];
    el.style.fill = info ? cMap[info.color] : '';
  });
  // Outer nodes
  const outerIdMap = {oi:'v-oi',oii:'v-oii',oiii:'v-oiii',oiv:'v-oiv',ov:'v-ov',ovi:'v-ovi'};
  Object.entries(outer).forEach(([k,v]) => {
    const el = document.getElementById(outerIdMap[k]);
    if (!el) return;
    el.textContent = v;
    const info = elemenInfo[v];
    el.style.fill = info ? cMap[info.color] : '#c9a84c';
  });
}

  _currentTab = 'inner';
